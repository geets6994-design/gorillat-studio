<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillat 4K Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #22c55e, #16a34a); padding: 30px; border-radius: 15px; margin-bottom: 30px; text-align: center; }
        h1 { font-size: 2.5rem; font-weight: bold; margin-bottom: 5px; }
        .subtitle { font-size: 0.9rem; opacity: 0.9; }
        section { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 30px; margin-bottom: 30px; }
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #22c55e; }
        .upload-box { border: 2px dashed #22c55e; border-radius: 15px; padding: 50px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: rgba(34, 197, 94, 0.05); }
        .upload-box:hover { border-color: #16a34a; background: rgba(34, 197, 94, 0.1); }
        .upload-box.dragover { border-color: #4ade80; background: rgba(74, 222, 128, 0.15); }
        .icon-big { font-size: 3rem; margin-bottom: 15px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 15px; }
        input[type="text"]:focus { outline: none; border-color: #22c55e; }
        input[type="file"] { display: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        button { padding: 12px 24px; background: #22c55e; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #16a34a; transform: translateY(-2px); }
        button:disabled { background: #666; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #444; color: #fff; }
        .btn-secondary:hover { background: #555; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .video-card { background: #0a0a0a; border: 1px solid #333; border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.3s; }
        .video-card:hover { border-color: #22c55e; transform: translateY(-5px); }
        .video-card h3 { font-size: 1.1rem; margin-bottom: 10px; }
        .video-meta { font-size: 0.9rem; color: #999; margin: 5px 0; }
        .badge { display: inline-block; background: #22c55e; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge.blue { background: #3b82f6; color: #fff; }
        .badge.green { background: #22c55e; color: #000; }
        .progress { background: #333; height: 8px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar { background: linear-gradient(90deg, #22c55e, #16a34a); height: 100%; transition: width 0.3s; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 50px; z-index: 1000; animation: slideDown 0.3s ease; }
        .notification.success { background: #22c55e; color: #000; }
        .notification.error { background: #ef4444; color: #fff; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; border-radius: 15px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .close-btn { float: right; font-size: 2rem; cursor: pointer; color: #999; }
        .close-btn:hover { color: #22c55e; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #333; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background: #22c55e; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🦍 Gorillat Share</h1>
            <p class="subtitle">Partage de vidéos 4K gratuit • Lien unique</p>
        </header>

        <!-- Upload Section -->
        <section>
            <h2>📤 Envoyer des Vidéos</h2>
            
            <div class="form-row">
                <div>
                    <label>Qui envoie ?</label>
                    <input type="text" id="uploaderName" placeholder="Ex: Gorillat" maxlength="50">
                </div>
                <div>
                    <label>Type de vidéo</label>
                    <div class="tab-buttons">
                        <button class="tab-btn active" onclick="setVideoType('brute')">📹 Brutes</button>
                        <button class="tab-btn" onclick="setVideoType('montee')">✨ Finale</button>
                    </div>
                </div>
            </div>

            <div>
                <label>Titre du lot</label>
                <input type="text" id="videoTitle" placeholder="Ex: TROLL EN LOBBY" maxlength="100">
            </div>

            <div id="thumbnailSection" style="display: none;">
                <label>Miniature (Optionnel)</label>
                <input type="file" id="thumbnailFile" accept="image/*" onchange="handleThumbnailSelect(event)">
                <button type="button" onclick="document.getElementById('thumbnailFile').click()" class="btn-secondary">🖼️ Ajouter une miniature</button>
                <div id="thumbnailPreview" style="margin-top: 10px;"></div>
            </div>

            <div style="margin-top: 20px;">
                <label>Vidéos</label>
                <div class="upload-box" id="uploadBox" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" onclick="document.getElementById('videoFiles').click()">
                    <div class="icon-big">🎬</div>
                    <p>Glisse tes vidéos ici ou clique</p>
                    <p style="font-size: 0.9rem; color: #999; margin-top: 10px;">Ou sélectionne plusieurs fichiers</p>
                </div>
                <input type="file" id="videoFiles" multiple accept="video/*" onchange="handleFileSelect(event)">
            </div>

            <div id="filesList" style="margin-top: 15px;"></div>

            <div id="progressContainer" style="display: none; margin-top: 20px;">
                <p id="uploadStatus" style="margin-bottom: 10px;">Préparation...</p>
                <div class="progress">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <p id="progressPercent" style="text-align: center; color: #999;">0%</p>
            </div>

            <div class="button-group" style="margin-top: 20px;">
                <button onclick="uploadVideos()" id="uploadBtn">✅ Envoyer les vidéos</button>
                <button class="btn-secondary" onclick="clearFiles()">🗑️ Effacer</button>
            </div>
        </section>

        <!-- Videos Display -->
        <section id="videosSection" style="display: none;">
            <h2>🎞️ Vidéos Brutes</h2>
            <div id="bruteVideosList" class="video-grid"></div>
        </section>

        <section id="finishedSection" style="display: none;">
            <h2>✅ Vidéos Finales</h2>
            <div id="finishedVideosList" class="video-grid"></div>
        </section>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <!-- Video Detail Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeVideoModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalInfo" style="color: #999; margin: 15px 0;"></p>
            <a id="downloadLink" href="#" target="_blank" class="button-group">
                <button style="width: 100%;">⬇️ Télécharger</button>
            </a>
        </div>
    </div>

    <script>
        const API_URL = 'https://gorillat-share-api.vercel.app'; // Tu peux utiliser Supabase aussi
        let selectedFiles = [];
        let videoType = 'brute';
        let thumbnailData = null;

        // Set video type
        function setVideoType(type) {
            videoType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('thumbnailSection').style.display = type === 'montee' ? 'block' : 'none';
        }

        // Handle file selection
        function handleFileSelect(e) {
            selectedFiles = Array.from(e.target.files);
            updateFilesList();
        }

        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('uploadBox').classList.add('dragover');
        }

        function handleDragLeave(e) {
            document.getElementById('uploadBox').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('uploadBox').classList.remove('dragover');
            selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('video/'));
            updateFilesList();
        }

        function updateFilesList() {
            const list = document.getElementById('filesList');
            if (selectedFiles.length === 0) {
                list.innerHTML = '';
                return;
            }
            list.innerHTML = `
                <p style="color: #999; margin-bottom: 10px;">📹 ${selectedFiles.length} fichier(s) sélectionné(s):</p>
                <div style="background: #0a0a0a; border-radius: 8px; padding: 10px; max-height: 200px; overflow-y: auto;">
                    ${selectedFiles.map((f, i) => `
                        <div style="display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333;">
                            <span style="font-size: 0.9rem; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${f.name}</span>
                            <button onclick="removeFile(${i})" class="btn-secondary" style="padding: 2px 8px; font-size: 0.8rem;">✕</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFilesList();
        }

        function clearFiles() {
            selectedFiles = [];
            document.getElementById('videoFiles').value = '';
            updateFilesList();
        }

        function handleThumbnailSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                thumbnailData = evt.target.result;
                document.getElementById('thumbnailPreview').innerHTML = `
                    <img src="${thumbnailData}" style="max-width: 150px; max-height: 100px; border-radius: 8px; border: 1px solid #333;">
                `;
            };
            reader.readAsDataURL(file);
        }

        // Upload to GoFile
        async function uploadToGofile(files) {
            try {
                const serverRes = await fetch('https://api.gofile.io/servers');
                const serverData = await serverRes.json();
                if (serverData.status !== 'ok') throw new Error('Serveurs indisponibles');
                
                const server = serverData.data.servers[0].name;
                let folderId = null;
                let downloadLink = null;

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    updateProgress((i / files.length) * 100, `Envoi ${i + 1}/${files.length}...`);

                    const formData = new FormData();
                    formData.append('file', file);
                    if (folderId) formData.append('folderId', folderId);

                    const res = await fetch(`https://${server}.gofile.io/uploadFile`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await res.json();
                    if (data.status !== 'ok') throw new Error('Upload échoué');

                    if (i === 0) {
                        folderId = data.data.parentFolder;
                        downloadLink = data.data.downloadPage;
                    }
                }

                updateProgress(100, 'Finalisation...');
                return downloadLink;
            } catch (err) {
                showNotification('Erreur upload: ' + err.message, 'error');
                throw err;
            }
        }

        // Main upload function
        async function uploadVideos() {
            const name = document.getElementById('uploaderName').value.trim();
            const title = document.getElementById('videoTitle').value.trim();

            if (!name || !title || selectedFiles.length === 0) {
                showNotification('Remplissez tous les champs', 'error');
                return;
            }

            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('progressContainer').style.display = 'block';

            try {
                const downloadLink = await uploadToGofile(selectedFiles);

                // Save to localStorage for demo (En production: utilise Firebase/Supabase)
                const videos = JSON.parse(localStorage.getItem('gorillat_videos') || '[]');
                videos.push({
                    id: Date.now(),
                    title,
                    uploader: name,
                    type: videoType,
                    downloadLink,
                    thumbnail: thumbnailData,
                    date: new Date().toLocaleDateString('fr-FR'),
                    fileCount: selectedFiles.length
                });
                localStorage.setItem('gorillat_videos', JSON.stringify(videos));

                showNotification('✅ Vidéos envoyées avec succès!', 'success');
                clearFiles();
                document.getElementById('uploaderName').value = '';
                document.getElementById('videoTitle').value = '';
                thumbnailData = null;
                document.getElementById('thumbnailPreview').innerHTML = '';
                loadVideos();

            } catch (err) {
                showNotification('Erreur: ' + err.message, 'error');
            } finally {
                document.getElementById('uploadBtn').disabled = false;
                document.getElementById('progressContainer').style.display = 'none';
            }
        }

        // Load and display videos
        function loadVideos() {
            const videos = JSON.parse(localStorage.getItem('gorillat_videos') || '[]');
            const brute = videos.filter(v => v.type === 'brute');
            const montee = videos.filter(v => v.type === 'montee');

            if (brute.length > 0) {
                document.getElementById('videosSection').style.display = 'block';
                document.getElementById('bruteVideosList').innerHTML = brute.map(v => `
                    <div class="video-card" onclick="openVideoModal(${v.id})">
                        <h3>${v.title}</h3>
                        <p class="video-meta">📤 ${v.uploader}</p>
                        <p class="video-meta">📅 ${v.date}</p>
                        <p class="video-meta">📹 ${v.fileCount} fichier(s)</p>
                        <span class="badge blue">BRUTE</span>
                    </div>
                `).join('');
            } else {
                document.getElementById('videosSection').style.display = 'none';
            }

            if (montee.length > 0) {
                document.getElementById('finishedSection').style.display = 'block';
                document.getElementById('finishedVideosList').innerHTML = montee.map(v => `
                    <div class="video-card" onclick="openVideoModal(${v.id})">
                        ${v.thumbnail ? `<img src="${v.thumbnail}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 10px;">` : ''}
                        <h3>${v.title}</h3>
                        <p class="video-meta">✨ ${v.uploader}</p>
                        <p class="video-meta">📅 ${v.date}</p>
                        <p class="video-meta">📹 ${v.fileCount} fichier(s)</p>
                        <span class="badge green">FINALE</span>
                    </div>
                `).join('');
            } else {
                document.getElementById('finishedSection').style.display = 'none';
            }
        }

        function openVideoModal(id) {
            const videos = JSON.parse(localStorage.getItem('gorillat_videos') || '[]');
            const video = videos.find(v => v.id === id);
            if (!video) return;

            document.getElementById('modalTitle').textContent = video.title;
            document.getElementById('modalInfo').innerHTML = `
                <strong>Type:</strong> ${video.type === 'montee' ? '✨ Finale' : '📹 Brute'}<br>
                <strong>Par:</strong> ${video.uploader}<br>
                <strong>Fichiers:</strong> ${video.fileCount}<br>
                <strong>Date:</strong> ${video.date}
            `;
            document.getElementById('downloadLink').href = video.downloadLink;
            document.getElementById('videoModal').classList.add('active');
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.remove('active');
        }

        function updateProgress(percent, status) {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = Math.round(percent) + '%';
            document.getElementById('uploadStatus').textContent = status;
        }

        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification ${type}`;
            setTimeout(() => notif.className = 'notification', 5000);
        }

        // Load videos on page load
        loadVideos();
    </script>
</body>
</html>
